<body>
  <h1>Namaste! Meri Website par Aaye Ho 🙏</h1>
  <p>Yeh meri pehli website hai!</p>
  <button onclick="alert('Namaste! Sampark karne ke liye dhanyavaad.')">
  Mujhse Sampark Karo
</button>
<h2 id="clock"></h2>

<script>
function updateClock() {
  let now = new Date();
  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString();
}

setInterval(updateClock, 1000);
updateClock();
</script>
